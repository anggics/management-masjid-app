# nginx.conf utama untuk container production (single-container Railway).
# Eksplisit agar tidak bergantung pada perilaku include bawaan Alpine.
user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Temp paths eksplisit (writable oleh www-data) — hindari Permission denied
    # saat nginx menulis body POST/upload besar ke file temp.
    client_body_temp_path /var/lib/nginx/tmp/client_body;
    proxy_temp_path /var/lib/nginx/tmp/proxy;
    fastcgi_temp_path /var/lib/nginx/tmp/fastcgi;
    uwsgi_temp_path /var/lib/nginx/tmp/uwsgi;
    scgi_temp_path /var/lib/nginx/tmp/scgi;

    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Server block aplikasi (di-render dari template oleh entrypoint).
    include /etc/nginx/http.d/default.conf;
}
