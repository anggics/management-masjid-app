# nginx.conf utama untuk container production (single-container Railway).
# Eksplisit agar tidak bergantung pada perilaku include bawaan Alpine.
user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Server block aplikasi (di-render dari template oleh entrypoint).
    include /etc/nginx/http.d/default.conf;
}
