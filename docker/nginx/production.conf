server {
    # ${PORT} di-render oleh entrypoint (envsubst) — Railway inject port dinamis.
    listen ${PORT};
    server_name _;
    root /var/www/public;
    index index.php index.html;

    client_max_body_size 16M;

    # Security headers (sesuai System Design — bagian Keamanan)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Service worker harus di-serve dari root scope
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Media upload — di-serve langsung dari volume (storage/app/public).
    # '^~' memberi prioritas di atas location regex gambar (.png dll) di bawah.
    # Pakai 'alias' TANPA try_files (kombinasi alias+try_files punya bug path
    # ganda di nginx). nginx serve file langsung; 404 alami bila tak ada.
    location ^~ /storage/ {
        alias /var/www/storage/app/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Single-container: php-fpm di localhost (bukan service 'app').
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 60;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
